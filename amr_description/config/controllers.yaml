controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController


diff_drive_controller:
  ros__parameters:
    use_sim_time: true
    cmd_vel_timeout: 0.25

    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.30
    wheel_radius: 0.04

    publish_rate: 50.0

    odom_frame_id: odom
    base_frame_id: base_footprint

    enable_odom_tf: true
    publish_odom: true
    use_stamped_vel: false

    cmd_vel_topic: /cmd_vel

    # IMPORTANT (adds stability)
    velocity_rolling_window_size: 10

    # IMPORTANT (EKF trust tuning)
    pose_covariance_diagonal: [0.01, 0.01, 1000000.0, 1000000.0, 1000000.0, 0.05]
    twist_covariance_diagonal: [0.01, 0.01, 1000000.0, 1000000.0, 1000000.0, 0.05]

    # OPTIONAL BUT USEFUL (smooth motion)
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 0.5
        min_velocity: -0.5
        has_acceleration_limits: true
        max_acceleration: 1.0

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 0.5
        min_velocity: -0.5
        has_acceleration_limits: true
        max_acceleration: 1.0
